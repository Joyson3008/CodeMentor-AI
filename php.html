<button class="theme-button" onclick="toggleTheme()">🔆</button>
 <!-- Back Button -->

     <a href="javascript:history.back()">⬅</a>
  </div>


  <div class="container">
    <h1>CodeMentor AI - PHP Code Runner</h1>
    <form id="phpForm">
      <div class="editor-container">
        <textarea id="phpCode" placeholder="Write your PHP code here...">&lt;?php echo 'Hello, PHP!'; ?&gt;</textarea>
  <button type="submit">Run Code</button>
  <button type="button" onclick="savePHPCode()">Save Code</button>
      </div>
    
    </form>

    <button id="aiButton">CodeMentor AI</button>
    <div id="output">Output</div>
    <div id="generateWithAI">AI code runs here...</div>
  </div>

  <footer>
    <p>Created by Joyson R | CodeMentor AI 2024</p>
  </footer>

  <script>
  function toggleTheme() {
      document.body.classList.toggle('dark-mode');
    }

    function savePHPCode() {
      const phpCode = document.getElementById('phpCode').value;
      const blob = new Blob([phpCode], { type: 'text/php' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'code.php';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    async function runPHP() {
      const phpCode = document.getElementById('phpCode').value;
      const student_id = localStorage.getItem('student_id');

      if (!student_id) {
        alert('Error: No student ID found. Please log in.');
        return;
      }

      try {
        const response = await fetch('http://localhost:3005/run-php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phpCode, student_id })
        });

        const result = await response.json();
        document.getElementById('output').textContent = response.ok
          ? result.output || 'PHP code executed successfully'
          : `Error: ${result.message}. Details: ${result.errorMessage || 'No additional details'}`;
      } catch (error) {
        document.getElementById('output').textContent = `Error: Unable to connect to server. ${error.message}`;
      }
    }

    async function analyzeWithAI() {
      const code = document.getElementById('phpCode').value.trim();
      const aiOutputElement = document.getElementById('generateWithAI');

      if (!code) {
        aiOutputElement.textContent = 'Error: Please enter PHP code.';
        return;
      }

      try {
        const response = await fetch('http://localhost:5000/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: code }),
        });

        const result = await response.json();
        aiOutputElement.textContent = response.ok
          ? result.output || 'No suggestions from AI.'
          : `Error: ${result.message || 'An error occurred.'}`;
      } catch (error) {
        aiOutputElement.textContent = 'Error: Unable to connect to AI server.';
      }
    }

    document.getElementById('phpForm').addEventListener('submit', (event) => {
      event.preventDefault();
      runPHP();
    });

    document.getElementById('aiButton').addEventListener('click', (event) => {
      event.preventDefault();
      analyzeWithAI();
    });
  </script>
